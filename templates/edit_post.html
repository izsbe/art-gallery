<!DOCTYPE html>
<html>

<head>
  <title>Edit Post</title>
</head>

<body>
  <h1>Edit post</h1>
  {% for message in get_flashed_messages() %}
    <p>
      <b>{{ message }}</b>
    </p>
  {% endfor %}
  <form action="/update_post" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" value="{{ post.title }}" maxlength="50" required/>
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="6" cols="60" maxlength="1000" required>{{ post.description }}</textarea>
    </p>

    <p>
      Art form: <br />
      {% for category in all_categories %}
        <label>
          <input
            type="checkbox"
            name="categories"
            value="{{ category.id }}"
            {% for selected in selected_categories %}
              {% if selected.id == category.id %}
                checked
              {% endif %}
            {% endfor %}
          >
          {{ category.name }}
        </label>
        <br>
      {% endfor %}
    </p>

    <input type="hidden" name="post_id" value="{{ post.id }}" />
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Update Post" />
  </form>
</body>

</html>

{% extends "layout.html" %}

{% block title %}Art gallery{% endblock %}

{% block content %}
  <h2>Edit post</h2>
  <form action="/update_post" method="post">
    <p>
      <label for="title">Title</label>:<br />
      <input id="title" type="text" name="title" value="{{ post.title }}" maxlength="50" required/>
    </p>
    <p>
      <label for="description">Description</label>:<br />
      <textarea id="description" name="description" rows="5" cols="50" maxlength="1000"
      required>{{ post.description }}</textarea>
    </p>

    <p>
      Art form: <br />
      {% for category in all_categories %}
        <label>
          <input
            type="checkbox"
            name="categories"
            value="{{ category.id }}"
            {% for selected in selected_categories %}
              {% if selected.id == category.id %}
                checked
              {% endif %}
            {% endfor %}
          >
          {{ category.name }}
        </label>
        <br>
      {% endfor %}
    </p>

    <input type="hidden" name="post_id" value="{{ post.id }}" />
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Update Post" />
  </form>
{% endblock %}

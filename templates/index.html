<!DOCTYPE html>
<html>

<head>
  <title>Art gallery</title>
</head>

<body>
  <h1>Art gallery</h1>

  {% if session.username %}
  <p>
    Signed in as {{ session.username }}, your id-number is {{session.user_id}}
  </p>
  {% endif %}

  <p>
    <a href="/login">Sign in</a>
    <a href="/register">Sign up</a>
    <a href="/logout">Sign out</a>
  </p>

   <p>
    <a href="/new_post">New post</a>
    <a href="/find_post">Search</a>
  </p>

  <h2>Posts</h2>

  <ul>
    {% for post in posts %}
    <li><a href="/post/{{ post.id }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</body>

</html>

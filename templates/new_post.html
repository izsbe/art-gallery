<!DOCTYPE html>
<html>

<head>
  <title>New post</title>
</head>

<body>
  <h1>New post</h1>
  <form action="/create_post" method="post" enctype="multipart/form-data">
    <p>
      Title: <br />
      <input type="text" name="title" value="{{ filled.title }}" maxlength="50" required/>
    </p>
    <p>
      Artwork image: <input type="file" name="image" accept=".jpg, jpeg" />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="6" cols="60" maxlength="1000"
      required>{{ filled.description }}</textarea>
    </p>

    <p>
      Art form: <br>
      {% for category in categories %}
        <label>
          <input
            type="checkbox"
            name="categories"
            value="{{ category.id }}"
            {% if category.id|string in filled.categories %}checked{% endif %}>
          {{ category.name }}
        </label><br>
      {% endfor %}
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Post artwork" />
  </form>
  <p>
    <a href="/">Back</a>
  </p>
</body>

</html>

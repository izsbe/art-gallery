<!DOCTYPE html>
<html>

<head>
  <title>New post</title>
</head>

<body>
  <h1>New post</h1>
  <form action="/create_post" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" maxlength="50" required/>
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="6" cols="60" maxlength="1000" required></textarea>
    </p>

    <p>
      Art form: <br>
      {% for category in categories %}
        <label>
          <input
            type="checkbox"
            name="categories"
            value="{{ category.id }}">
          {{ category.name }}
        </label><br>
      {% endfor %}
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Post artwork" />
  </form>
  <p>
    <a href="/">Back</a>
  </p>
</body>

</html>

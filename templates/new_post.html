{% extends "layout.html" %}

{% block title %}Art gallery{% endblock %}

{% block content %}
  <h2>New post</h2>
  <form action="/create_post" method="post" enctype="multipart/form-data">
    <p>
      <label for="title">Title</label>:<br />
      <input id="title" type="text" name="title" value="{{ filled.title }}" maxlength="50" required/>
    </p>
    <p>
      Artwork image: <input type="file" name="image" accept=".jpg, jpeg" />
    </p>
    <p>
      <label for="description">Description</label>:<br />
      <textarea id="description" name="description" rows="5" cols="50" maxlength="1000"
      required>{{ filled.description }}</textarea>
    </p>

    <p>
      Art form: <br>
      {% for category in categories %}
        <label>
          <input
            type="checkbox"
            name="categories"
            value="{{ category.id }}"
            {% if category.id|string in filled.categories %}checked{% endif %}>
          {{ category.name }}
        </label><br>
      {% endfor %}
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Post artwork" />
  </form>
{% endblock %}

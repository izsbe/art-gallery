<!DOCTYPE html>
<html>

<head>
  <title>{{ post.title }}</title>
</head>

<body>
  <h1>{{ post.title }}</h1>
  {% if session.user_id == post.user_id %}
  <p>
    <a href="/edit_post/{{ post.id }}">Edit</a>
    <a href="/remove_post/{{ post.id }}">Remove</a>
  </p>
  {% endif %}
  <p>
    {{ post.description }}
  </p>
  <p>
    Poster: <a href="/user/{{post.user_id}}">{{ post.username }}</a>
  </p>
  {% if categorys %}
  <p>
    Art form:
    <ul>
      {% for category in categorys %}
      <li>{{ category.title }}: {{ category.value }}</li>
      {% endfor %}
    </ul>
  </p>
  {% endif %}
  <p>
    <a href="/">Back</a>
  </p>
</body>

</html>

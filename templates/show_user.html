{% extends "layout.html" %}

{% block title %}Art gallery{% endblock %}

{% block content %}
  <h2>Userpage for {{ user.username }}</h2>
  <p>
    User has {{ posts | count }} posts and {{ comments }} comments
  </p>
  <h2>Posts</h2>
  <ul>
    {% for post in posts %}
    <li><a href="/post/{{ post.id }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
{% endblock %}

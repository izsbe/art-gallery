<!DOCTYPE html>
<html>

<head>
  <title>Userpage for {{ user.username }}</title>
</head>

<body>
  <h1>Userpage for {{ user.username }}</h1>
  <p>
    User has {{ posts | count }} posts and {{ comments }} comments
  </p>
  <h2>Posts</h2>
  <ul>
    {% for post in posts %}
    <li><a href="/post/{{ post.id }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
  <p>
    <a href="/">Back</a>
  </p>
</body>

</html>
